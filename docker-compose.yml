version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: depanne_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: depanne
      POSTGRES_PASSWORD: depanne_secret
      POSTGRES_DB: depanne_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depanne -d depanne_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: depanne_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  mailpit:
    image: axllent/mailpit:latest
    container_name: depanne_mail
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

volumes:
  postgres_data:
  redis_data: